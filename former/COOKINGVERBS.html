<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Từ Vựng A2-B1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fef2f2;
            /* Màu Red-50 (Màu của nhiệt, bếp lửa) */
        }

        .flip-card {
            perspective: 1000px;
            width: 100%;
            height: 520px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            background-color: white;
            display: flex;
            flex-direction: column;
        }

        .flip-card-back {
            transform: rotateY(180deg);
        }

        input:focus {
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.3);
            /* Red shadow */
            outline: none;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-5px);
            }

            40%,
            80% {
                transform: translateX(5px);
            }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        .input-error {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
            color: #b91c1c !important;
        }

        #topic-toast {
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>

<body class="text-gray-800 p-4 md:p-8 min-h-screen flex flex-col items-center justify-center relative overflow-hidden">

    <!-- Toast Notification -->

    <script>
        const flashcards = [
            // VOCABULARY - COOKING VERBS
            { topic: "Cooking Verbs", word: "boil", phonetic: "/bɔɪl/", type: "verb", mean: "luộc, đun sôi", ex: "Please _______ the vegetables for ten minutes before adding them to the soup.", exVi: "Vui lòng luộc rau trong mười phút trước khi cho chúng vào súp." },

            { topic: "Cooking Verbs", word: "Dot", phonetic: "/dɒt/", type: "verb", mean: "chấm/đặt từng miếng nhỏ", ex: "_______ the top of the pie with butter before baking it.", exVi: "Đặt từng miếng bơ nhỏ lên trên mặt bánh pie trước khi nướng." },
            { topic: "Cooking Verbs", word: "Drain", phonetic: "/dreɪn/", type: "verb", mean: "để ráo nước", ex: "_______ the pasta well before mixing it with the sauce.", exVi: "Để ráo nước mì ống thật kỹ trước khi trộn với nước sốt." },
            { topic: "Cooking Verbs", word: "Flour", phonetic: "/ˈflaʊə(r)/", type: "verb", mean: "phủ bột", ex: "_______ the table lightly before you place the dough on it.", exVi: "Phủ một lớp bột mỏng lên bàn trước khi bạn đặt bột nhào lên." },

            { topic: "Cooking Verbs", word: "Knead", phonetic: "/niːd/", type: "verb", mean: "nhào bột", ex: "_______ the dough until it feels soft and elastic.", exVi: "Nhào bột cho đến khi có cảm giác mềm và đàn hồi." },
            { topic: "Cooking Verbs", word: "Ladle", phonetic: "/ˈleɪdəl/", type: "verb", mean: "múc bằng vá", ex: "_______ the soup into bowls while it is still hot.", exVi: "Dùng vá múc súp vào bát khi nó vẫn còn nóng." },

            { topic: "Cooking Verbs", word: "Pit", phonetic: "/pɪt/", type: "verb", mean: "bỏ hạt", ex: "_______ the cherries before you use them in the pie.", exVi: "Bỏ hạt anh đào trước khi bạn sử dụng chúng trong bánh pie." },
            { topic: "Cooking Verbs", word: "Roll", phonetic: "/rəʊl/", type: "verb", mean: "cán/lăn", ex: "_______ the dough into a thin circle on the counter.", exVi: "Cán bột thành một hình tròn mỏng trên mặt bàn." },
            { topic: "Cooking Verbs", word: "Saute", phonetic: "/ˈsəʊteɪ/", type: "verb", mean: "xào nhanh", ex: "_______ the mushrooms in butter for two minutes.", exVi: "Xào nhanh nấm trong bơ khoảng hai phút." },
            { topic: "Cooking Verbs", word: "Scald", phonetic: "/skɔːld/", type: "verb", mean: "trụng nước sôi", ex: "_______ the milk before mixing it with the flour.", exVi: "Trụng nước sôi sữa trước khi trộn nó với bột mì." },
            { topic: "Cooking Verbs", word: "Shred", phonetic: "/ʃred/", type: "verb", mean: "xé/bào sợi", ex: "_______ the chicken into small pieces for sandwiches.", exVi: "Xé thịt gà thành những miếng nhỏ cho món bánh mì kẹp." },
            { topic: "Cooking Verbs", word: "Sift", phonetic: "/sɪft/", type: "verb", mean: "rây", ex: "_______ the flour before you add it to the bowl.", exVi: "Rây bột trước khi bạn cho nó vào bát." },
            { topic: "Cooking Verbs", word: "Simmer", phonetic: "/ˈsɪmə(r)/", type: "verb", mean: "ninh lửa nhỏ", ex: "_______ the sauce slowly for richer flavor.", exVi: "Ninh nhỏ lửa nước sốt từ từ để có hương vị đậm đà hơn." },
            { topic: "Cooking Verbs", word: "Stir", phonetic: "/stɜː(r)/", type: "verb", mean: "khuấy", ex: "_______ the soup often so it does not stick.", exVi: "Khuấy súp thường xuyên để nó không bị dính." },
            { topic: "Cooking Verbs", word: "Toss", phonetic: "/tɒs/", type: "verb", mean: "xóc/trộn nhẹ", ex: "_______ the salad gently before serving it.", exVi: "Trộn nhẹ món salad trước khi dọn ra." },
            { topic: "Cooking Verbs", word: "Whip", phonetic: "/wɪp/", type: "verb", mean: "đánh bông", ex: "_______ the cream until it becomes thick.", exVi: "Đánh bông kem cho đến khi nó trở nên đặc." },
            { topic: "Cooking Verbs", word: "Whisk", phonetic: "/wɪsk/", type: "verb", mean: "đánh bằng phới", ex: "_______ the eggs quickly until they become smooth.", exVi: "Đánh trứng thật nhanh bằng phới cho đến khi chúng trở nên mịn." },
            { topic: "Cooking Verbs", word: "Zest", phonetic: "/zest/", type: "noun/verb", mean: "vỏ bào/cạo vỏ cam chanh", ex: "Add some lemon _______ to make the cake smell fresher.", exVi: "Thêm một ít vỏ bào chanh để làm cho bánh có mùi thơm mát hơn." }
        ];

        let currentIndex = 0;
        const totalCards = flashcards.length;
        let canGoNext = false;

        const flashcardEl = document.getElementById('flashcard');
        const inputsContainer = document.getElementById('letter-inputs-container');
        const finalScreen = document.getElementById('final-screen');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSuccessSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(987.77, audioCtx.currentTime);
            osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.4);
        }

        function playErrorSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(350, audioCtx.currentTime);
            osc.frequency.setValueAtTime(250, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.05);
            gainNode.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.1);
            gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.15);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.25);
        }

        function playTransitionSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15);
            osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.3);
            osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.45);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.8);
        }

        // --- Tính năng Text-to-Speech ---
        let preferredVoice = null;

        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) return;

            const goodFemaleVoices = [
                "Google US English",
                "Google UK English Female",
                "Samantha",
                "Victoria",
                "Karen",
                "Microsoft Zira",
                "Microsoft Hazel"
            ];

            for (let name of goodFemaleVoices) {
                const voice = voices.find(v => v.name.includes(name));
                if (voice) {
                    preferredVoice = voice;
                    break;
                }
            }

            if (!preferredVoice) {
                preferredVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Female')) ||
                    voices.find(v => v.lang === 'en-US') || voices[0];
            }
        }

        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function speakCurrentWord() {
            if (window.event) window.event.stopPropagation();

            const card = flashcards[currentIndex];
            const wordToSpeak = card.word.replace(/[\/-]/g, ' '); // Đọc phớt qua ký tự phân cách
            const utterance = new SpeechSynthesisUtterance(wordToSpeak);

            if (preferredVoice) {
                utterance.voice = preferredVoice;
            } else {
                utterance.lang = 'en-US';
            }

            utterance.rate = 0.85;
            utterance.pitch = 1.15;

            window.speechSynthesis.speak(utterance);
        }

        function showTopicToast(topicName) {
            const toast = document.getElementById('topic-toast');
            document.getElementById('toast-message').textContent = `Chủ đề mới: ${topicName}`;
            toast.classList.remove('translate-y-[-250%]');
            toast.classList.add('translate-y-0');

            setTimeout(() => {
                toast.classList.remove('translate-y-0');
                toast.classList.add('translate-y-[-250%]');
            }, 2500);
        }

        function renderCard() {
            const card = flashcards[currentIndex];

            document.getElementById('main-topic-title').textContent = `CHỦ ĐỀ: ${card.topic.toUpperCase()}`;
            document.getElementById('word-type').textContent = card.type;

            document.getElementById('word-mean').textContent = card.mean;
            document.getElementById('word-exVi').textContent = card.exVi;

            const blankedEx = card.ex.replace('_______', `<span class="text-red-600 border-b-2 border-red-600 inline-block w-24"></span>`);
            document.getElementById('word-ex').innerHTML = blankedEx;

            inputsContainer.innerHTML = '';
            const words = card.word.split(' ');

            words.forEach((w, wordIndex) => {
                const wordGroup = document.createElement('div');
                wordGroup.className = 'flex gap-1';

                for (let i = 0; i < w.length; i++) {
                    // Xử lý các ký tự gạch nối hoặc dấu gạch chéo
                    if (w[i] === '-' || w[i] === '/') {
                        const symbol = document.createElement('span');
                        symbol.textContent = w[i];
                        symbol.className = 'text-xl font-bold text-gray-400 self-center px-1';
                        wordGroup.appendChild(symbol);
                        continue;
                    }

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.maxLength = 1;

                    if (i === 0) {
                        // Ký tự đầu tiên hiển thị sẵn dạng chữ thường
                        input.value = w[i].toLowerCase();
                        input.readOnly = true;
                        input.className = 'char-input hint-input w-9 h-11 md:w-10 md:h-12 text-center text-xl font-bold border-2 border-red-200 bg-red-100 text-red-700 rounded-lg cursor-not-allowed select-none shadow-sm';
                    } else {
                        input.className = 'char-input editable-input w-9 h-11 md:w-10 md:h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-lg focus:border-red-500 focus:bg-red-50 transition-colors bg-white text-red-800 shadow-inner';

                        input.addEventListener('input', function () {
                            this.value = this.value.toLowerCase();
                            this.classList.remove('input-error');

                            const editableInputs = Array.from(document.querySelectorAll('.editable-input'));
                            const currentIdx = editableInputs.indexOf(this);
                            if (this.value && currentIdx < editableInputs.length - 1) {
                                editableInputs[currentIdx + 1].focus();
                            }
                        });

                        input.addEventListener('keydown', function (e) {
                            const editableInputs = Array.from(document.querySelectorAll('.editable-input'));
                            const currentIdx = editableInputs.indexOf(this);

                            if (e.key === 'Backspace' && !this.value && currentIdx > 0) {
                                editableInputs[currentIdx - 1].focus();
                            } else if (e.key === 'Enter') {
                                if (!e.shiftKey) {
                                    e.preventDefault();
                                    e.stopPropagation();
                                    checkAnswer();
                                }
                            } else if (e.key === 'ArrowLeft' && currentIdx > 0) {
                                editableInputs[currentIdx - 1].focus();
                                e.preventDefault();
                            } else if (e.key === 'ArrowRight' && currentIdx < editableInputs.length - 1) {
                                editableInputs[currentIdx + 1].focus();
                                e.preventDefault();
                            }
                        });
                    }
                    wordGroup.appendChild(input);
                }
                inputsContainer.appendChild(wordGroup);

                if (wordIndex < words.length - 1) {
                    const space = document.createElement('div');
                    space.className = 'w-3 md:w-4';
                    inputsContainer.appendChild(space);
                }
            });

            setTimeout(() => {
                const firstEditableInput = document.querySelector('.editable-input');
                if (firstEditableInput) firstEditableInput.focus();
            }, 100);

            document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${totalCards}`;
            const percent = ((currentIndex + 1) / totalCards) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;

            const topPrevBtn = document.getElementById('top-prev-btn');
            if (currentIndex > 0) {
                topPrevBtn.classList.remove('hidden');
            } else {
                topPrevBtn.classList.add('hidden');
            }

            const nextBtn = document.getElementById('next-btn');
            if (currentIndex === totalCards - 1) {
                nextBtn.textContent = "Hoàn thành";
                nextBtn.className = "flex-1 py-3 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-lg shadow-md transition-colors";
            } else {
                nextBtn.textContent = "Tiếp theo";
                nextBtn.className = "flex-1 py-3 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-lg shadow-md transition-colors";
            }
        }

        function giveHint() {
            const card = flashcards[currentIndex];
            const targetWord = card.word.replace(/[\s-\/]/g, '');
            const allInputs = document.querySelectorAll('.char-input');
            const editableInputs = document.querySelectorAll('.editable-input');

            for (let i = 0; i < allInputs.length; i++) {
                if (!allInputs[i].readOnly && allInputs[i].value.toLowerCase() !== targetWord[i].toLowerCase()) {
                    allInputs[i].value = targetWord[i].toLowerCase();
                    allInputs[i].classList.remove('input-error');
                    allInputs[i].classList.add('bg-yellow-100', 'border-yellow-400', 'text-yellow-800');

                    let currentEditableIdx = Array.from(editableInputs).indexOf(allInputs[i]);
                    let next = currentEditableIdx + 1;
                    while (next < editableInputs.length && editableInputs[next].value !== '') {
                        next++;
                    }
                    if (next < editableInputs.length) editableInputs[next].focus();
                    else editableInputs[editableInputs.length - 1].focus();

                    break;
                }
            }
        }

        function checkAnswer() {
            const card = flashcards[currentIndex];
            const allInputs = document.querySelectorAll('.char-input');

            const userAnswer = Array.from(allInputs).map(inp => inp.value).join('').toLowerCase();
            const correctAnswer = card.word.replace(/[\s-\/]/g, '').toLowerCase();

            if (userAnswer === correctAnswer) {
                playSuccessSound();

                const resultHeader = document.getElementById('result-header');
                resultHeader.textContent = "🎉 Chính xác!";
                resultHeader.className = "text-center py-2 rounded-lg font-bold text-lg mb-4 bg-red-100 text-red-800";

                // Vẫn hiển thị đúng định dạng gốc của chữ (in hoa/thường) ở mặt sau
                document.getElementById('back-word').textContent = card.word;
                document.getElementById('back-phonetic').textContent = card.phonetic;
                document.getElementById('back-mean').textContent = `${card.mean} (${card.type})`;

                const fullSentence = card.ex.replace('_______', `<span class="font-bold text-red-700">${card.word}</span>`);
                document.getElementById('back-ex').innerHTML = fullSentence;

                flashcardEl.classList.add('flipped');

                canGoNext = false;
                setTimeout(() => { canGoNext = true; }, 500);

                if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                    document.activeElement.blur();
                }
            } else {
                playErrorSound();
                inputsContainer.classList.add('shake');
                setTimeout(() => inputsContainer.classList.remove('shake'), 400);

                let firstEmptyOrWrongInput = null;

                for (let i = 0; i < allInputs.length; i++) {
                    if (!allInputs[i].readOnly) {
                        if (allInputs[i].value !== '' && allInputs[i].value.toLowerCase() !== correctAnswer[i]) {
                            allInputs[i].value = '';
                            allInputs[i].classList.add('input-error');
                            if (!firstEmptyOrWrongInput) firstEmptyOrWrongInput = allInputs[i];
                        } else if (allInputs[i].value === '') {
                            allInputs[i].classList.add('input-error');
                            if (!firstEmptyOrWrongInput) firstEmptyOrWrongInput = allInputs[i];
                        }
                    }
                }

                if (firstEmptyOrWrongInput) {
                    firstEmptyOrWrongInput.focus();
                }
            }
        }

        function nextCard() {
            flashcardEl.classList.remove('flipped');

            setTimeout(() => {
                if (currentIndex < totalCards - 1) {
                    const currentTopic = flashcards[currentIndex].topic;
                    const nextTopicCard = flashcards[currentIndex + 1].topic;

                    currentIndex++;

                    if (currentTopic !== nextTopicCard) {
                        showTopicToast(nextTopicCard);
                        playTransitionSound();
                    }

                    renderCard();
                } else {
                    flashcardEl.classList.add('hidden');
                    finalScreen.classList.remove('hidden');
                }
            }, 300);
        }

        function prevCard() {
            if (currentIndex > 0) {
                flashcardEl.classList.remove('flipped');
                setTimeout(() => {
                    currentIndex--;
                    renderCard();
                }, 300);
            } else {
                flashcardEl.classList.remove('flipped');
            }
        }

        function resetQuiz() {
            currentIndex = 0;
            finalScreen.classList.add('hidden');
            flashcardEl.classList.remove('hidden');
            renderCard();
        }

        document.addEventListener('keydown', function (e) {
            if (e.altKey && e.key.toLowerCase() === 'h') {
                e.preventDefault();
                giveHint();
                return;
            }

            if ((e.shiftKey && e.key === 'Enter') || (e.ctrlKey && e.code === 'Space')) {
                e.preventDefault();
                speakCurrentWord();
                return;
            }

            if (e.key === 'Enter' && !e.shiftKey && flashcardEl.classList.contains('flipped') && canGoNext) {
                e.preventDefault();
                nextCard();
            }
        });

        document.addEventListener('DOMContentLoaded', renderCard);

    </script>
</body>
