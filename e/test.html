    <script>
        const quizData = [
          {
            title: "Part 1: Sentence Arrangement",
            instruction: "Mark the letter A, B, C or D to indicate the best arrangement of utterances or sentences to make a cohesive and coherent exchange or text.",
            questions: [
              {
                id: 1,
                text: "a. After digital signatures, disbursement will be transferred to your account within one business day.\nb. For assistance, contact your loan officer or reply to this message directly.\nc. We are pleased to confirm your personal loan application has been formally approved today.\nd. Note that the offer expires in seven days and rates may adjust if lapsed.\ne. Please review the attached agreement and upload required documents through the secure borrower portal.",
                options: ["c-a-e-d-b", "e-c-a-d-b", "c-e-a-d-b", "c-e-d-a-b"],
                correct: 2,
                explanation: `Thứ tự hợp lý là c-e-a-d-b. Câu c mở đầu thông báo chấp thuận khoản vay, sau đó câu e yêu cầu xem xét hợp đồng và tải tài liệu, tiếp theo câu a thông báo về việc giải ngân sau khi ký số, câu d nhắc nhở về thời hạn hiệu lực của đề nghị, và cuối cùng câu b cung cấp thông tin liên hệ hỗ trợ. Đây là trình tự logic của một thư xác nhận khoản vay từ thông báo chấp thuận đến hướng dẫn thực hiện và thông tin liên hệ.
A. SAI - Thứ tự c-a-e-d-b không logic vì câu a nói về giải ngân sau khi ký số nhưng lại đặt trước câu e yêu cầu xem xét hợp đồng và tải tài liệu.
B. SAI - Thứ tự e-c-a-d-b bắt đầu bằng yêu cầu xem xét hợp đồng trước khi thông báo chấp thuận khoản vay, điều này không hợp lý về mặt giao tiếp.
C. ĐÚNG - Thứ tự c-e-a-d-b tuân theo logic: thông báo chấp thuận → yêu cầu xem xét và tải tài liệu → giải ngân sau ký số → nhắc nhở thời hạn → thông tin liên hệ.
D. SAI - Thứ tự c-e-d-a-b đặt câu d về thời hạn hiệu lực trước câu a về giải ngân, làm gián đoạn luồng thông tin về quy trình thực hiện.`,
                translation: `c. Chúng tôi vui mừng xác nhận đơn xin vay cá nhân của quý khách đã được chính thức phê duyệt hôm nay.\ne. Vui lòng xem xét hợp đồng đính kèm và tải lên các tài liệu yêu cầu thông qua cổng thông tin người vay bảo mật.\na. Sau khi ký số, khoản giải ngân sẽ được chuyển vào tài khoản của quý khách trong vòng một ngày làm việc.\nd. Lưu ý rằng đề nghị này có hiệu lực trong bảy ngày và lãi suất có thể điều chỉnh nếu quá hạn.\nb. Để được hỗ trợ, vui lòng liên hệ với nhân viên tư vấn khoản vay của quý khách hoặc trả lời trực tiếp tin nhắn này.`
              },
              {
                id: 2,
                text: "a. Lisa: Don’t worry about it. I can work through this section on my own.\nb. David: Then let me know if you change your mind. I’m free all evening.\nc. David: Hey Lisa, I noticed you’re struggling with the physics assignment. Would you like some help?",
                options: ["c-b-a", "b-c-a", "c-a-b", "a-c-b"],
                correct: 2,
                explanation: `Thứ tự hợp lý là c-a-b. Câu c là lời đề nghị giúp đỡ của David khi thấy Lisa gặp khó khăn với bài tập vật lý, câu a là lời từ chối lịch sự của Lisa, và câu b là lời đáp lại của David để Lisa biết có thể liên hệ nếu thay đổi ý định. Đây là cấu trúc đối thoại tự nhiên: đề nghị → từ chối → đáp lại.
A. SAI - Thứ tự c-b-a không logic vì câu b nói "if you change your mind" nhưng chưa có lời từ chối nào trước đó.
B. SAI - Thứ tự b-c-a bắt đầu bằng câu b về việc thay đổi ý định trước khi có lời đề nghị giúp đỡ, không hợp lý.
C. ĐÚNG - Thứ tự c-a-b tuân theo logic đối thoại tự nhiên: David đề nghị giúp đỡ → Lisa từ chối → David đáp lại sẵn sàng giúp nếu cần.
D. SAI - Thứ tự a-c-b bắt đầu bằng lời từ chối trước khi có lời đề nghị, không hợp lý về mặt giao tiếp.`,
                translation: `c. David: Này Lisa, tôi để ý cậu đang gặp khó khăn với bài tập vật lý. Cậu có muốn được giúp không?\na. Lisa: Đừng lo lắng về điều đó. Tôi có thể tự làm phần này.\nb. David: Vậy hãy cho tôi biết nếu cậu thay đổi ý định. Tôi rảnh cả tối.`
              },
              {
                id: 3,
                text: "a. Construction efforts subsequently led to the establishment of underground tunnels beneath major thoroughfares, fundamentally altering the city’s transportation infrastructure.\nb. The initiative reflects Ho Chi Minh City’s commitment to sustainable urban mobility and reducing persistent traffic congestion.\nc. Since its inception in the early 2010s, Ho Chi Minh City’s metro system has evolved into a transformative infrastructure endeavor.\nd. Additionally, elevated railway sections were constructed along key corridors, connecting densely populated districts with commercial hubs.\ne. These structural improvements were accompanied by the modernisation of station facilities, incorporating advanced ticketing systems and passenger amenities.",
                options: ["c-b-a-d-e", "c-a-d-e-b", "b-c-a-e-d", "c-d-a-b-e"],
                correct: 1,
                explanation: `Thứ tự hợp lý là c-a-d-e-b. Câu c giới thiệu về hệ thống metro TP.HCM từ đầu những năm 2010, câu a nói về các đường hầm ngầm, câu d nói về các tuyến đường sắt trên cao, câu e nói về cải tiến cơ sở vật chất nhà ga, và cuối cùng câu b tổng kết về cam kết phát triển giao thông bền vững.
A. SAI - Thứ tự c-b-a-d-e đặt câu b về cam kết bền vững quá sớm trước khi mô tả các công trình cụ thể.
B. ĐÚNG - Thứ tự c-a-d-e-b tuân theo logic: giới thiệu dự án → đường hầm ngầm → đường sắt trên cao → cải tiến nhà ga → ý nghĩa tổng thể.
C. SAI - Thứ tự b-c-a-e-d bắt đầu bằng tổng kết về cam kết trước khi giới thiệu dự án, không hợp lý.
D. SAI - Thứ tự c-d-a-b-e đặt đường sắt trên cao (d) trước đường hầm ngầm (a), nhưng văn cảnh cho thấy đường hầm được xây dựng trước.`,
                translation: `c. Kể từ khi khởi công vào đầu những năm 2010, hệ thống metro của Thành phố Hồ Chí Minh đã phát triển thành một nỗ lực cơ sở hạ tầng mang tính chuyển đổi.\na. Các nỗ lực xây dựng sau đó đã dẫn đến việc thiết lập các đường hầm ngầm bên dưới các trục đường chính, thay đổi căn bản cơ sở hạ tầng giao thông của thành phố.\nd. Thêm vào đó, các tuyến đường sắt trên cao được xây dựng dọc theo các hành lang chính, kết nối các quận đông dân cư với các trung tâm thương mại.\ne. Những cải tiến cấu trúc này đi kèm với việc hiện đại hóa các cơ sở nhà ga, kết hợp các hệ thống bán vé tiên tiến và tiện nghi cho hành khách.\nb. Sáng kiến này phản ánh cam kết của Thành phố Hồ Chí Minh đối với việc di chuyển đô thị bền vững và giảm tình trạng tắc nghẽn giao thông dai dẳng.`
              },
              {
                id: 4,
                text: "a. Sophie: That’s true, but online learning allows access to more global resources.\nb. Sophie: Would you rather study at school or take online courses?\nc. Sophie: I think combining both methods could lead to the best learning outcome.\nd. Daniel: And it encourages self-discipline and digital collaboration, which are valuable skills.\ne. Daniel: I like online classes for flexibility, but studying at school keeps me focused.",
                options: ["b-e-a-d-c", "a-c-b-e-d", "c-b-a-d-e", "a-b-d-c-e"],
                correct: 0,
                explanation: `Thứ tự hợp lý là b-e-a-d-c. Câu b là câu hỏi mở đầu của Sophie, câu e là câu trả lời của Daniel, câu a là ý kiến bổ sung của Sophie, câu d là bổ sung thêm của Daniel, và câu c là kết luận của Sophie về việc kết hợp cả hai phương pháp.
A. ĐÚNG - Thứ tự b-e-a-d-c tuân theo logic: Sophie hỏi → Daniel trả lời → Sophie bổ sung → Daniel bổ sung thêm → Sophie kết luận.
B. SAI - Thứ tự a-c-b-e-d bắt đầu bằng câu a về tài nguyên toàn cầu trước khi có câu hỏi, không hợp lý.
C. SAI - Thứ tự c-b-a-d-e bắt đầu bằng kết luận về kết hợp phương pháp trước khi thảo luận, không logic.
D. SAI - Thứ tự a-b-d-c-e không có câu trả lời ban đầu của Daniel sau câu hỏi, làm gián đoạn luồng đối thoại.`,
                translation: `b. Sophie: Bạn thích học ở trường hay tham gia các khóa học trực tuyến hơn?\ne. Daniel: Tôi thích lớp học trực tuyến vì tính linh hoạt, nhưng học ở trường giúp tôi tập trung hơn.\na. Sophie: Điều đó đúng, nhưng học trực tuyến cho phép tiếp cận nhiều nguồn tài nguyên toàn cầu hơn.\nd. Daniel: Và nó khuyến khích tự kỷ luật và hợp tác kỹ thuật số, những kỹ năng có giá trị.\nc. Sophie: Tôi nghĩ việc kết hợp cả hai phương pháp có thể dẫn đến kết quả học tập tốt nhất.`
              },
              {
                id: 5,
                text: "a. At the beginning of the academic year, I struggled to juggle multiple assignments and extracurricular activities simultaneously.\nb. I tried to spread myself too thin, believing I could handle everything without proper planning or prioritization.\nc. This lesson stuck with me and transformed how I approach my responsibilities in every aspect of life.\nd. However, I ended up missing deadlines and disappointing both my teachers and myself with incomplete work.\ne. Afterward, I learned to prioritize tasks and say no to commitments that would overwhelm my schedule.",
                options: ["a-d-b-e-c", "b-a-d-c-e", "a-b-d-e-c", "c-a-b-d-e"],
                correct: 2,
                explanation: `Thứ tự hợp lý là a-b-d-e-c. Câu a giới thiệu tình huống ban đầu, câu b mô tả hành động sai lầm, câu d nói về hậu quả tiêu cực, câu e nói về bài học rút ra, và câu c kết luận về tác động lâu dài của bài học này.
A. SAI - Thứ tự a-d-b-e-c đặt hậu quả (d) trước hành động sai lầm (b), không hợp lý về mặt nhân quả.
B. SAI - Thứ tự b-a-d-c-e bắt đầu bằng hành động sai lầm trước khi giới thiệu bối cảnh tình huống.
C. ĐÚNG - Thứ tự a-b-d-e-c tuân theo logic: tình huống khó khăn → hành động sai lầm → hậu quả tiêu cực → bài học rút ra → tác động lâu dài.
D. SAI - Thứ tự c-a-b-d-e bắt đầu bằng kết luận về tác động trước khi kể câu chuyện, không hợp lý.`,
                translation: `a. Vào đầu năm học, tôi gặp khó khăn trong việc xoay xở nhiều bài tập và hoạt động ngoại khóa cùng một lúc.\nb. Tôi cố gắng làm quá nhiều thứ, tin rằng mình có thể xử lý mọi thứ mà không cần lập kế hoạch hoặc ưu tiên hợp lý.\nd. Tuy nhiên, tôi đã bỏ lỡ thời hạn và làm thất vọng cả giáo viên lẫn bản thân với những bài làm chưa hoàn thành.\ne. Sau đó, tôi học được cách sắp xếp ưu tiên công việc và từ chối những cam kết sẽ làm quá tải lịch trình của mình.\nc. Bài học này đã in sâu vào tôi và thay đổi cách tôi tiếp cận trách nhiệm của mình trong mọi khía cạnh của cuộc sống.`
              }
            ]
          },
          {
            title: "Part 2: Guided Cloze Test - Oceanview Resort",
            instruction: "Read the following letter and choose the option that best fits each of the numbered blanks from 6 to 11.",
            passage: "Oceanview Resort & Spa\nDear Mr. Johnson,\n\nThank you for choosing Oceanview Resort for your upcoming vacation. We are delighted to confirm your reservation and have (6) ______ every arrangement to ensure your stay exceeds expectations.\n\n1. Booking Details\nCheck-in: March 15, 2025 | Check-out: March 20, 2025\nRoom Type: Deluxe Ocean Suite\n\n2. Complimentary Services\nYou will receive (7) ______ of welcome amenities including champagne, fresh fruit, and chocolates upon arrival. Our facilities include a spa, fitness center, (8) ______ three beachfront restaurants.\n\n3. Room Features\nYour (9) ______ balcony suite offers breathtaking views and modern conveniences. Early check-in is available (10) ______ request, subject to room availability.\n\nWe pride ourselves (11) ______ delivering personalized service and creating memorable experiences for our guests. Should you require any special arrangements, please contact our concierge team.\n\nWarm regards,\nSarah Mitchell\nReservations Manager",
            passageTranslation: `Oceanview Resort & Spa\nKính gửi Ông Johnson,\n\nCảm ơn Ông đã lựa chọn Oceanview Resort cho kỳ nghỉ sắp tới của mình. Chúng tôi rất vui mừng xác nhận đặt phòng của Ông và đã (6) hoàn tất mọi sắp xếp để đảm bảo kỳ nghỉ của Ông vượt quá mong đợi.\n\n1. Chi tiết đặt phòng:\nNhận phòng: 15 tháng 3, 2025 | Trả phòng: 20 tháng 3, 2025\nLoại phòng: Phòng Suite Đại Dương Cao Cấp\n\n2. Dịch vụ miễn phí:\nÔng sẽ nhận được (7) một tuyển chọn các tiện nghi chào mừng bao gồm rượu champagne, trái cây tươi và sô-cô-la khi đến. Cơ sở vật chất của chúng tôi bao gồm spa, trung tâm thể dục, (8) và ba nhà hàng ven biển.\n\n3. Đặc điểm phòng:\nPhòng suite ban công (9) rộng rãi riêng tư ven biển của Ông mang đến tầm nhìn ngoạn mục và tiện nghi hiện đại. Nhận phòng sớm có sẵn (10) theo yêu cầu, tùy thuộc vào tình trạng phòng trống.\n\nChúng tôi tự hào (11) về việc cung cấp dịch vụ được cá nhân hóa và tạo ra những trải nghiệm đáng nhớ cho khách của chúng tôi. Nếu Ông cần bất kỳ sắp xếp đặc biệt nào, vui lòng liên hệ với đội ngũ lễ tân của chúng tôi.\n\nTrân trọng,\nSarah Mitchell\nQuản lý Đặt phòng`,
            questions: [
              { 
                id: 6, text: "Question 6", options: ["finalized", "concluded", "terminated", "completed"], correct: 0,
                explanation: `A. finalized /ˈfaɪnəlaɪzd/ (động từ): hoàn tất, hoàn thiện\nB. concluded /kənˈkluːdɪd/ (động từ): kết thúc, kết luận\nC. terminated /ˈtɜːmɪneɪtɪd/ (động từ): chấm dứt, kết thúc (thường có nghĩa tiêu cực)\nD. completed /kəmˈpliːtɪd/ (động từ): hoàn thành\n\nGiải thích: Trong ngữ cảnh "have finalized every arrangement", từ "finalized" phù hợp nhất để diễn tả việc hoàn tất mọi sắp xếp một cách chính thức và chu đáo cho kỳ nghỉ của khách.\nA. ĐÚNG - Phù hợp với ngữ cảnh khách sạn.\nB. SAI - Thường dùng để kết thúc một quá trình.\nC. SAI - Mang nghĩa chấm dứt tiêu cực.\nD. SAI - Không chuyên nghiệp bằng "finalized".`
              },
              { 
                id: 7, text: "Question 7", options: ["an assortment", "a quantity", "a multitude", "a volume"], correct: 0,
                explanation: `A. an assortment /ən əˈsɔːtmənt/ (danh từ): một tuyển chọn, một loạt đa dạng\nB. a quantity /ə ˈkwɒntəti/ (danh từ): một số lượng\nC. a multitude /ə ˈmʌltɪtjuːd/ (danh từ): một lượng lớn, đám đông\nD. a volume /ə ˈvɒljuːm/ (danh từ): khối lượng, âm lượng\n\nGiải thích: "an assortment" phù hợp nhất để mô tả một tuyển chọn đa dạng các món quà chào mừng.\nA. ĐÚNG - Diễn tả bộ sưu tập đa dạng.\nB. SAI - Chỉ số lượng.\nC. SAI - Dùng cho đám đông người.\nD. SAI - Dùng đo khối lượng/âm thanh.`
              },
              { 
                id: 8, text: "Question 8", options: ["yet", "and", "so", "for"], correct: 1,
                explanation: `A. yet (nhưng)\nB. and (và)\nC. so (vì vậy)\nD. for (bởi vì)\n\nGiải thích: Liên từ "and" được dùng để nối các danh sách các tiện ích song song (spa, fitness center, AND restaurants).`
              },
              { 
                id: 9, text: "Question 9", options: ["spacious private oceanfront", "private spacious oceanfront", "oceanfront spacious private", "private oceanfront spacious"], correct: 0,
                explanation: `Giải thích: Trật tự tính từ: Size (kích thước) - Opinion (đặc điểm) - Location (vị trí).\n"spacious" (rộng rãi) - "private" (riêng tư) - "oceanfront" (ven biển).\nA. ĐÚNG.`
              },
              { 
                id: 10, text: "Question 10", options: ["upon", "at", "by", "in"], correct: 0,
                explanation: `Cụm từ "upon request" là một cụm cố định trong tiếng Anh, có nghĩa là "theo yêu cầu".\nA. ĐÚNG - "Upon request" là cụm chuẩn xác nhất.`
              },

            passage: "Papermaking originated in ancient China during the Han Dynasty, revolutionizing how information was recorded and shared. (12) _______. This knowledge remained closely guarded for centuries, giving Chinese scholars and administrators a significant advantage in documentation and communication.\n\nThe technique gradually spread westward along the Silk Road through trade and cultural exchange. (13) _______. These craftsmen established workshops in major cities, adapting the process to local materials and needs while maintaining the core principles of the craft.\n\nBy the 12th century, paper mills had appeared across Europe, transforming intellectual life on the continent. (14) _______. The availability of this affordable writing material enabled the Renaissance and the subsequent explosion of printed literature.\n\nThe impact of papermaking on global civilization cannot be overstated. (15) _______. From scientific journals to personal letters, paper became the primary medium for human expression and record-keeping for nearly a millennium.\n\nModern technology has introduced digital alternatives, yet paper remains essential in many contexts. (16) _______. This enduring relevance demonstrates how a simple invention can fundamentally shape human society across centuries and cultures.",

            instruction: "Read the following announcement and choose the option that best fits each of the numbered blanks from 17 to 22.",
            passage: "General Secretary Receives International Delegates for Hanoi Convention Signing Ceremony\n\nHANOI – General Secretary Tô Lâm welcomed delegation heads from fifteen nations (17) ______ participated in the official signing ceremony of the Hanoi Convention on Cooperation and Development, (18) ______ at the Presidential Palace yesterday morning.\n\nThe convention establishes frameworks for regional (19) ______ across economic development, environmental protection, and cultural exchange. Delegation leaders expressed strong (20) ______ for Vietnam’s initiative in organizing this historic diplomatic event. General Secretary Lâm emphasized the convention’s significance in strengthening multilateral ties and promoting sustainable development throughout Southeast Asia.\n\nThe ceremony concluded with representatives (21) ______ the convention documents, followed by a state banquet. Over the coming months, participating nations will (22) ______ comprehensive action plans to implement the convention’s provisions effectively.",
            passageTranslation: `Tổng Bí thư Tiếp Các Đại Biểu Quốc Tế Cho Lễ Ký Kết Công Ước Hà Nội\n\nHÀ NỘI – Tổng Bí thư Tô Lâm đã đón tiếp các trưởng đoàn từ mười lăm quốc gia (17) những người đã tham gia vào lễ ký kết chính thức Công ước Hà Nội về Hợp tác và Phát triển, (18) được tổ chức tại Phủ Chủ tịch sáng hôm qua.\n\nCông ước này thiết lập các khuôn khổ cho (19) sự hợp tác khu vực về phát triển kinh tế, bảo vệ môi trường và trao đổi văn hóa. Các trưởng đoàn bày tỏ sự (20) ủng hộ mạnh mẽ đối với sáng kiến của Việt Nam trong việc tổ chức sự kiện ngoại giao lịch sử này. Tổng Bí thư Lâm nhấn mạnh tầm quan trọng của công ước trong việc tăng cường quan hệ đa phương và thúc đẩy phát triển bền vững trên toàn Đông Nam Á.\n\nLễ kết thúc với các đại diện (21) ký các tài liệu công ước, tiếp theo là bữa tiệc quốc yến. Trong những tháng tới, các quốc gia tham gia sẽ (22) soạn thảo các kế hoạch hành động toàn diện để thực hiện các điều khoản của công ước một cách hiệu quả.`,

          {
            title: "Part 5: Reading Comprehension - Data Localization",
            instruction: "Read the passage and indicate the best answer to each of the following questions from 23 to 30.",
            passage: "Data localization, sometimes conflated with data residency, mandates that personal records tied to a country be first collected, processed, and stored within its borders before any outbound transfer occurs. Such transfers, if permitted, typically follow compliance steps – notice, explicit consent, and disclosure of use. The principle is grounded in data sovereignty: data is governed by the laws of the jurisdiction where it is gathered. While sovereignty speaks to legal authority over data, localization operationalizes that authority by front-loading domestic handling prior to any cross-border movement.\n\nGovernments and enterprises advance localization for several intertwined reasons. It is framed as a bulwark for security, keeping sensitive assets on home soil. It anchors privacy under specific regimes (for instance, GDPR), reassures national sovereignty over citizens’ information, and can catalyze domestic jobs by compelling in-country infrastructure. Proponents also cite performance: services may respond faster when data sits nearer to users, reducing latency. Critics, however, warn that these justifications vary in weight depending on sector, threat surface, and institutional capacity.\n\nLocalization unfolds through on-premises facilities, sovereign-region clouds, and carefully choreographed transfers and processing. Firms may replicate datasets, yet regulators can stipulate sequencing constraints on erasure. Under certain regimes, foreign copies relating to local residents must be deleted only after deletion has occurred on systems inside the data subject’s country. In practice, they may sit in local and foreign environments concurrently until compliance steps are satisfied. These regimes translate policy into architecture, procurement, and audit trails that prove the chain of custody.\n\nThe calculus is double-edged. Security, privacy alignment, local job creation, and reduced latency represent tangible dividends; yet costs balloon with duplicate data centers, legal complexity, and operational overhead. Access can narrow across borders, interoperability may fray, and trade can be hampered when vendors cannot freely move information. Policymakers thus juggle economic development with openness, attempting to codify controls without stifling transnational services. Outcomes hinge on implementation nuance: exemptions, adequacy findings, and verifiable controls can temper the sharpest frictions.",
            passageTranslation: `Bản địa hóa dữ liệu, đôi khi bị nhầm lẫn với cư trú dữ liệu, yêu cầu rằng các hồ sơ cá nhân gắn với một quốc gia phải được thu thập, xử lý và lưu trữ đầu tiên trong biên giới của nước đó trước khi bất kỳ chuyển giao ra nước ngoài nào xảy ra. Các chuyển giao như vậy, nếu được phép, thường tuân theo các bước tuân thủ – thông báo, sự đồng ý rõ ràng và công bố việc sử dụng. Nguyên tắc này được dựa trên chủ quyền dữ liệu: dữ liệu được điều chỉnh bởi luật pháp của khu vực pháp lý nơi nó được thu thập. Trong khi chủ quyền nói về thẩm quyền pháp lý đối với dữ liệu, bản địa hóa vận hành thẩm quyền đó bằng cách ưu tiên xử lý trong nước trước bất kỳ di chuyển xuyên biên giới nào.\n\nCác chính phủ và doanh nghiệp thúc đẩy bản địa hóa vì nhiều lý do đan xen. Nó được khung như một thành trì cho an ninh, giữ các tài sản nhạy cảm trên đất nhà. Nó neo giữ quyền riêng tư theo các chế độ cụ thể (ví dụ, GDPR), đảm bảo chủ quyền quốc gia đối với thông tin công dân, và có thể thúc đẩy việc làm trong nước bằng cách bắt buộc cơ sở hạ tầng trong nước. Những người ủng hộ cũng trích dẫn hiệu suất: dịch vụ có thể phản hồi nhanh hơn khi dữ liệu nằm gần người dùng hơn, giảm độ trễ. Tuy nhiên, những người chỉ trích cảnh báo rằng những lý do này khác nhau về trọng lượng tùy thuộc vào lĩnh vực, bề mặt đe dọa và năng lực thể chế.\n\nBản địa hóa diễn ra thông qua các cơ sở tại chỗ, đám mây khu vực có chủ quyền, và chuyển giao và xử lý được dàn dựng cẩn thận. Các công ty có thể sao chép các bộ dữ liệu, nhưng các cơ quan quản lý có thể quy định các ràng buộc trình tự về việc xóa. Theo một số chế độ nhất định, các bản sao nước ngoài liên quan đến cư dân địa phương chỉ phải được xóa sau khi việc xóa đã xảy ra trên các hệ thống bên trong quốc gia của chủ thể dữ liệu. Trong thực tế, chúng có thể nằm trong cả môi trường địa phương và nước ngoài đồng thời cho đến khi các bước tuân thủ được thỏa mãn. Các chế độ này dịch chính sách thành kiến trúc, mua sắm và dấu vết kiểm toán chứng minh chuỗi giám sát.\n\nTính toán là hai lưỡi gươm. An ninh, sự phù hợp về quyền riêng tư, tạo việc làm địa phương và giảm độ trễ đại diện cho những lợi ích hữu hình; nhưng chi phí phồng lên với các trung tâm dữ liệu trùng lặp, sự phức tạp pháp lý và chi phí vận hành. Truy cập có thể thu hẹp qua biên giới, khả năng tương tác có thể suy yếu, và thương mại có thể bị cản trở khi các nhà cung cấp không thể tự do di chuyển thông tin. Do đó, các nhà hoạch định chính sách phải cân bằng phát triển kinh tế với sự cởi mở, cố gắng hợp thức hóa các biện pháp kiểm soát mà không kìm hãm các dịch vụ xuyên quốc gia. Kết quả phụ thuộc vào sắc thái triển khai: các miễn trừ, phát hiện đầy đủ và biện pháp kiểm soát có thể xác minh có thể làm dịu những ma sát sắc nhọn nhất.`,

            title: "Part 6: Reading Comprehension - Data Is Labor",
            instruction: "Read the passage and indicate the best answer to each of the following questions from 31 to 40.",
            passage: "The nineteenth-century “Mill Girls” remind us that solidarity can transmute private hardship into public leverage. They refused the oppressing hand of avarice, stitched wages to dignity, and helped seed modern unions. Today, something analogous is happening: individuals no longer merely vend hours; they continuously emit monetizable traces. [I] If those traces are corralled collectively – rather than siphoned asymmetrically by platforms – then communities can bargain for remuneration the way workers once bargained for safer looms, shorter shifts, and transparent accounts.\n\nAcross jurisdictions, lawmakers are cautiously legitimising intermediaries that pool personal data on behalf of members. The EU’s forthcoming Data Governance Act explicitly entertains “data cooperatives” as brokers between subjects and users; GDPR already distinguishes controllers and processors. Because personal data is non-rival, multiple firms can exploit the same records simultaneously without depletion. [II] This abundance intensifies power imbalances unless communities acquire vehicles – unions, cooperatives, collectives – to negotiate access terms, constrain misuse, and redirect flows of value back to participants.\n\nData pricing remains skewed because incumbents both define the product and set its price; arbitrageurs are scarce. Swash, for instance, surfaces how browsers monetise clickstreams and invites counter-offers; litigation campaigns like the Data Dividend Project contest mispricing and misuse in court. Even when people are not organizing for wages, they can still organise their data to create community income, shifting value from platforms to participants. [III] When legal victories and transparent markets converge, third parties can finally “arb” fairer prices for communities’ digital exhaust.\n\nThere are three mutually reinforcing paths: Policy that recognises data-subject cooperatives; Lawsuits that indemnify communities for misuse; and Tech that automates consent, measurement, and distribution. [IV] If these paths mature together, they could reframe economics, ethics, and human rights around #DataIsLabor, normalising the idea that participation entitles people to a dividend. Dozens of emergent unions already incubate this future, from browser-level plugins to nonprofit trusts, each experimenting with governance that returns agency – and proceeds – to those who generate the raw material.",

            let containerClass = `p-4 md:p-5 rounded-xl border transition-all `;
            if (state.isSubmitted) {
                containerClass += isCorrect ? 'bg-green-50/50 border-green-200' : 'bg-red-50/50 border-red-200';
            } else {
                containerClass += isAnswered ? 'bg-slate-50 border-blue-200' : 'bg-white border-slate-200 hover:border-slate-300';
            }

            let optionsHtml = q.options.map((option, optIdx) => {
                const isSelected = state.answers[q.id] === optIdx;
                const isOptionCorrect = optIdx === q.correct;
                
                let optionClass = "flex items-start gap-3 p-3 rounded-lg border transition-all cursor-pointer ";
                let iconHtml = '';

                if (!state.isSubmitted) {
                    optionClass += isSelected 
                    ? "bg-blue-50 border-blue-400 shadow-sm" 
                    : "bg-white border-slate-200 hover:bg-slate-50";
                } else {
                    optionClass += "cursor-default ";
                    if (isOptionCorrect) {
                        optionClass += "bg-green-100 border-green-500 font-medium ";
                        iconHtml = `<i class="fa-solid fa-check text-green-600 mt-1"></i>`;
                    } else if (isSelected && !isOptionCorrect) {
                        optionClass += "bg-red-100 border-red-400 ";
                        iconHtml = `<i class="fa-solid fa-xmark text-red-500 mt-1"></i>`;
                    } else {
                        optionClass += "bg-white/50 border-slate-200 opacity-60 ";
                    }
                }

                let circleClass = `w-6 h-6 shrink-0 rounded-full border-2 flex items-center justify-center text-xs font-bold mt-0.5 transition-colors bg-white `;
                if (isSelected) {
                    circleClass += (state.isSubmitted && !isOptionCorrect) ? 'border-red-500 text-red-500' : 'border-blue-500 text-blue-500';
                } else {
                    circleClass += 'border-slate-300 text-slate-400';
                }
                if (state.isSubmitted && isOptionCorrect) circleClass += ' border-green-600 text-green-600';

                return `
                    <label class="${optionClass}">
                        <input type="radio" name="question-${q.id}" class="hidden" ${isSelected ? 'checked' : ''} ${state.isSubmitted ? 'disabled' : ''} onchange="handleOptionChange(${q.id}, ${optIdx})">
                        <div class="${circleClass}">${String.fromCharCode(65 + optIdx)}</div>
                        <span class="flex-1 text-slate-700 leading-relaxed pt-[2px] text-sm md:text-base">${option}</span>
                        ${iconHtml}
                    </label>
                `;
            }).join('');

            let errorHtml = (state.isSubmitted && !isCorrect) ? `
                <div class="mt-4 flex items-start gap-2 text-sm text-red-700 bg-red-100/50 p-3 rounded-lg border border-red-200">
                    <i class="fa-solid fa-circle-exclamation mt-0.5 text-lg"></i>
                    <p>Bạn đã chọn sai. Đáp án đúng là <strong>${String.fromCharCode(65 + q.correct)}</strong>.</p>
                </div>
            ` : '';

            let explanationHtml = '';
            if (state.isSubmitted && q.explanation) {
                explanationHtml = `
                    <div class="mt-5 border-t border-slate-200/60 pt-4">
                        <button onclick="toggleExplanation(${q.id})" class="flex items-center gap-2 text-sm font-bold transition-colors ${showExp ? 'text-indigo-700' : 'text-blue-600 hover:text-blue-800'}">
                            <i class="fa-solid fa-book-open"></i>
                            ${showExp ? 'Ẩn giải thích' : 'Xem giải thích chi tiết'}
                            <i class="fa-solid ${showExp ? 'fa-chevron-up' : 'fa-chevron-down'} ml-1"></i>
                        </button>
                        
                        ${showExp ? `
                        <div class="mt-4 bg-indigo-50/70 p-4 md:p-5 rounded-xl border border-indigo-100 text-sm text-slate-800 shadow-inner">
                            <div class="whitespace-pre-wrap leading-relaxed">${q.explanation}</div>
                            ${q.translation ? `
                            <div class="mt-4 pt-4 border-t border-indigo-200/60">
                                <div class="flex items-center gap-1.5 font-bold text-indigo-900 mb-2">
                                    <i class="fa-solid fa-language"></i> Bản dịch:
                                </div>
                                <div class="whitespace-pre-wrap leading-relaxed italic text-slate-700">${q.translation}</div>
                            </div>
                            ` : ''}
                        </div>
                        ` : ''}
                    </div>
                `;
            }

            return `
                <div id="question-${q.id}" class="${containerClass}">
                    <div class="flex gap-3">
                        <div class="font-bold text-slate-700 min-w-[65px] pt-0.5">
                            Câu ${q.id}.
                        </div>
                        <div class="flex-1">
                            <p class="text-slate-800 whitespace-pre-wrap mb-4 text-sm md:text-base leading-relaxed">${q.text}</p>
                            <div class="space-y-2.5">
                                ${optionsHtml}
                            </div>
                            ${errorHtml}
                            ${explanationHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        // Event Handlers
        window.handleOptionChange = (qId, optIdx) => {
            if (state.isSubmitted) return;
            state.answers[qId] = optIdx;
            renderApp();
        };

        window.calculateScore = () => {
            let currentScore = 0;
            quizData.forEach(section => {
                section.questions.forEach(q => {
                    if (state.answers[q.id] === q.correct) {
                        currentScore += 1;
                    }
                });
            });
            state.score = currentScore;
            state.isSubmitted = true;
            renderApp();
        };

        window.changePart = (newIndex) => {
            state.currentPartIndex = newIndex;
            state.showPassageTranslation = false; // Reset dịch khi đổi bài
            renderApp();
            setTimeout(() => {
                const qContainer = document.getElementById('questions-container');
                if (qContainer) qContainer.scrollTo({ top: 0, behavior: 'smooth' });
                const pContainer = document.getElementById('passage-container');
                if (pContainer) pContainer.scrollTo({ top: 0, behavior: 'smooth' });
            }, 50);
        };

        window.resetQuiz = () => {
            if (confirm('Bạn có chắc chắn muốn làm lại từ đầu? Mọi đáp án hiện tại sẽ bị xóa.')) {
                state.answers = {};
                state.isSubmitted = false;
                state.score = 0;
                state.expandedExplanations = {};
                changePart(0);
            }
        };

        window.togglePassageTranslation = () => {
            state.showPassageTranslation = !state.showPassageTranslation;
            renderApp();
        };

        window.toggleExplanation = (qId) => {
            state.expandedExplanations[qId] = !state.expandedExplanations[qId];
            renderApp();
        };

        window.performScroll = (id) => {
            const container = document.getElementById('questions-container');
            const el = document.getElementById(`question-${id}`);
            
            if (container && el) {
                const containerTop = container.getBoundingClientRect().top;
                const elTop = el.getBoundingClientRect().top;
                const currentScroll = container.scrollTop;
                const targetScroll = currentScroll + (elTop - containerTop) - 16; 
                
                container.scrollTo({
                    top: targetScroll,
                    behavior: "smooth"
                });
            }
        };

        window.scrollToQuestion = (id) => {
            const targetPartIndex = quizData.findIndex(section => 
                section.questions.some(q => q.id === id)
            );

            if (targetPartIndex !== -1 && targetPartIndex !== state.currentPartIndex) {
                state.currentPartIndex = targetPartIndex;
                state.showPassageTranslation = false;
                renderApp();
                setTimeout(() => performScroll(id), 100);
            } else {
                performScroll(id);
            }
        };

        // Khởi chạy lần đầu
        renderApp();
    </script>
</body>
</html>
